name: Build .deb (Jailbreak → Sileo Repo)

on:
  workflow_dispatch:
    inputs:
      bundle_filter:
        description: 'Bundle ID(s) to inject into (comma-separated)'
        required: false
        default: 'jp.co.cygames.umamusume,app.papaya2933.cheetah1054,com.komoe.kmumamusumegp,com.komoe.umamusumeofficial,com.kakaogames.umamusume,com.bilibili.umamusu,com.cygames.umamusume'
        type: string

permissions:
  contents: read

jobs:
  build-ios:
    runs-on: macos-latest
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[ci skip]')
    timeout-minutes: 45
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          key: aarch64-apple-ios

      - name: Setup and Patch Dependencies
        run: |
          pushd ..
          git clone --revision 44cdd653e2317d300fb8a6c9c36b03f23991e803 https://github.com/emilk/egui.git
          cd egui
          sed -i '' 's/ui.set_min_width(ui.available_width());/\/\/ ui.set_min_width(ui.available_width());/' crates/egui/src/containers/combo_box.rs
          popd

          echo -e "\negui = { path = '../egui/crates/egui' }" >> Cargo.toml
          echo "egui_extras = { path = '../egui/crates/egui_extras' }" >> Cargo.toml

      - name: Install Rust toolchain + iOS target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install build tools
        run: brew install ldid cmake

      - name: Build libdobby.a for iOS (arm64)
        run: |
          git clone --depth 1 https://github.com/jmpews/Dobby.git /tmp/dobby

          TARGET_FILE="/tmp/dobby/source/Backend/UserMode/ExecMemory/code-patch-tool-darwin.cc"

          perl -pi -e 's/PUBLIC int DobbyCodePatch/int DobbyCodePatch_Standard/g' "$TARGET_FILE"

          cat << 'EOF' >> "$TARGET_FILE"

          #include <mach-o/dyld.h>
          #include <sys/sysctl.h>
          #include <stdlib.h>
          #include <string.h>
          #include <unistd.h>
          #include <dlfcn.h>
          #include "PlatformUnifiedInterface/ExecMemory/ClearCacheTool.h"

          extern "C" {
              __attribute__((noinline,optnone,naked))
              void BreakJITWrite(void* dest, void* src, size_t bytes) {
                  __asm__("brk #0x70 \n ret");
              }
          }

          static bool is_macos_hardware() {
              bool is_mac = false;
              void* objc_lib = dlopen("/usr/lib/libobjc.A.dylib", RTLD_LAZY);
              if (!objc_lib) return false;

              typedef void* (*objc_getClass_t)(const char*);
              typedef void* (*sel_registerName_t)(const char*);
              typedef void* (*objc_msgSend_ptr_t)(void*, void*);
              typedef bool  (*objc_msgSend_bool_t)(void*, void*);
              typedef void* (*object_getClass_t)(void*);
              typedef bool  (*class_respondsToSelector_t)(void*, void*);

              void* sym_getClass = dlsym(objc_lib, "objc_getClass");
              void* sym_selReg = dlsym(objc_lib, "sel_registerName");
              void* sym_msgSend = dlsym(objc_lib, "objc_msgSend");
              void* sym_objGetClass = dlsym(objc_lib, "object_getClass");
              void* sym_responds = dlsym(objc_lib, "class_respondsToSelector");

              if (sym_getClass && sym_selReg && sym_msgSend && sym_objGetClass && sym_responds) {
                  auto my_objc_getClass = (objc_getClass_t)sym_getClass;
                  auto my_sel_registerName = (sel_registerName_t)sym_selReg;
                  auto msgSend_ptr = (objc_msgSend_ptr_t)sym_msgSend;
                  auto msgSend_bool = (objc_msgSend_bool_t)sym_msgSend;
                  auto my_object_getClass = (object_getClass_t)sym_objGetClass;
                  auto my_class_respondsToSelector = (class_respondsToSelector_t)sym_responds;

                  void* cls = my_objc_getClass("NSProcessInfo");
                  if (cls) {
                      void* processInfo = msgSend_ptr(cls, my_sel_registerName("processInfo"));
                      if (processInfo) {
                          void* sel_isMac = my_sel_registerName("isiOSAppOnMac");
                          void* obj_cls = my_object_getClass(processInfo);

                          if (my_class_respondsToSelector(obj_cls, sel_isMac)) {
                              is_mac = msgSend_bool(processInfo, sel_isMac);
                          }
                      }
                  }
              }

              dlclose(objc_lib);
              return is_mac;
          }

          PUBLIC int DobbyCodePatch(void *address, uint8_t *buffer, uint32_t buffer_size) {
              static int use_jit_bypass = -1;

              if (use_jit_bypass == -1) {
                  use_jit_bypass = 0;

                  bool is_mac = is_macos_hardware();

                  bool is_ios26_plus = false;
                  char os_version[32] = {0};
                  size_t size = sizeof(os_version);
                  if (sysctlbyname("kern.osproductversion", os_version, &size, NULL, 0) == 0) {
                      int major = atoi(os_version);
                      if (major >= 26) {
                          is_ios26_plus = true;
                      }
                  }

                  if (!is_mac && is_ios26_plus) {
                      use_jit_bypass = 1;
                  }
              }

              if (use_jit_bypass == 1) {
                  if (address == nullptr || buffer == nullptr || buffer_size == 0) return -1;

                  size_t page_size = sysconf(_SC_PAGESIZE);
                  addr_t patch_page = ALIGN_FLOOR(address, page_size);

                  if ((addr_t)address + buffer_size > patch_page + page_size) {
                      void *address_a = address;
                      uint8_t *buffer_a = buffer;
                      uint32_t buffer_size_a = (patch_page + page_size - (addr_t)address);
                      if (DobbyCodePatch(address_a, buffer_a, buffer_size_a) == -1) return -1;

                      void *address_b = (void *)((addr_t)address + buffer_size_a);
                      uint8_t *buffer_b = buffer + buffer_size_a;
                      uint32_t buffer_size_b = buffer_size - buffer_size_a;
                      return DobbyCodePatch(address_b, buffer_b, buffer_size_b);
                  }

                  BreakJITWrite(address, buffer, buffer_size);
                  ClearCache(address, (void *)((addr_t)address + buffer_size));
                  return 0;
              }

              return DobbyCodePatch_Standard(address, buffer, buffer_size);
          }
          EOF

          IOS_SDK="$(xcrun --sdk iphoneos --show-sdk-path)"

          cmake -S /tmp/dobby -B /tmp/dobby-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_SYSTEM_PROCESSOR=arm64 \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT="${IOS_SDK}" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="14.0" \
            -DCMAKE_C_COMPILER="$(xcrun --find clang)" \
            -DCMAKE_CXX_COMPILER="$(xcrun --find clang++)" \
            -DPlugin.Darwin.HideLibrary=OFF \
            -DPlugin.Darwin.MachOReWrite=OFF \
            -DDOBBY_GENERATE_SHARED=OFF \
            -DDOBBY_DEBUG=OFF

          cmake --build /tmp/dobby-build --config Release -- -j$(sysctl -n hw.ncpu)

          LIB=$(find /tmp/dobby-build -name "libdobby.a" | head -1)
          if [ -z "$LIB" ]; then
            echo "ERROR: libdobby.a not found after build"
            find /tmp/dobby-build -name "*.a"
            exit 1
          fi
          echo "Built: $LIB"

          cargo fetch --target aarch64-apple-ios 2>/dev/null || true

          DOBBY_SYS_DIR=$(find ~/.cargo/git/checkouts -path "*/dobby-sys*/dobby_static" 2>/dev/null | head -1)
          if [ -n "$DOBBY_SYS_DIR" ]; then
            mkdir -p "${DOBBY_SYS_DIR}/darwin/arm64"
            cp "$LIB" "${DOBBY_SYS_DIR}/darwin/arm64/libdobby.a"
            echo "Injected into: ${DOBBY_SYS_DIR}/darwin/arm64/"
          else
            echo "WARNING: dobby-sys checkout not found in git cache, trying registry"
            DOBBY_SYS_DIR=$(find ~/.cargo/registry/src -path "*/dobby-sys*/dobby_static" 2>/dev/null | head -1)
            if [ -n "$DOBBY_SYS_DIR" ]; then
              mkdir -p "${DOBBY_SYS_DIR}/darwin/arm64"
              cp "$LIB" "${DOBBY_SYS_DIR}/darwin/arm64/libdobby.a"
              echo "Injected into registry: ${DOBBY_SYS_DIR}/darwin/arm64/"
            else
              echo "ERROR: could not find dobby-sys source directory"
              find ~/.cargo -name "dobby_static" 2>/dev/null
              exit 1
            fi
          fi

      - name: Build Hachimi for iOS (aarch64)
        run: |
          cargo build \
            --target aarch64-apple-ios \
            --release \
            --target-dir build
        env:
          HACHIMI_IGNORE_DIRTY: "true"
          IPHONEOS_DEPLOYMENT_TARGET: "14.0"
          CXXSTDLIB: "c++"
          RUSTFLAGS: >-
            -C link-arg=-Wl,-install_name,@rpath/libhachimi.dylib

      - name: Fake-sign the dylib
        run: |
          DYLIB="build/aarch64-apple-ios/release/libhachimi.dylib"
          ldid -S "${DYLIB}"
          echo "Signed: $(ls -lh ${DYLIB})"

      - name: Upload iOS dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-dylib
          path: build/aarch64-apple-ios/release/libhachimi.dylib
          if-no-files-found: error

  build-deb:
    runs-on: ubuntu-latest
    needs: build-ios

    environment:
      name: BuildiOS

    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download iOS dylib artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-dylib
          path: artifacts/

      - name: Start Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          hostname: gha-deb-${{ github.run_id }}

      - name: 📌 Read version from Cargo.toml
        run: |
          VERSION=$(awk '/^\[package\]/{flag=1} flag && /^version/{print $3; exit}' Cargo.toml | tr -d '"')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "📌 Version: $VERSION"

      - name: 📦 Build Rootful + Rootless .deb
        env:
          BUNDLE_FILTER: ${{ inputs.bundle_filter }}
        run: |
          chmod +x tools/ios/build_deb.sh
          tools/ios/build_deb.sh artifacts/libhachimi.dylib "$VERSION"

          # Verify .deb integrity
          echo ""
          echo "═══ Verifying .deb packages ═══"
          for deb in hachimi_${VERSION}_*.deb; do
            echo "--- $deb ---"
            dpkg-deb --info "$deb"
            dpkg-deb --contents "$deb"
            echo ""
          done

      - name: 📋 Generate APT Repo Metadata
        run: |
          # 1. Tạo cấu trúc repo
          mkdir -p repo/debs
          cp hachimi_${VERSION}_*.deb repo/debs/

          # 2. Generate Packages index
          cd repo
          dpkg-scanpackages -m debs > Packages

          echo "═══ Packages Index ═══"
          cat Packages

          # 3. Compress
          bzip2 -k Packages
          gzip -k Packages

          # 4. Generate Release
          cat > Release <<EOF
          Origin: Furiri
          Label: Hachimi
          Suite: stable
          Version: ${VERSION}
          Codename: ios
          Architectures: iphoneos-arm iphoneos-arm64
          Components: main
          Description: Hachimi - Game enhancement and translation mod
          MD5Sum:
           $(md5sum Packages | awk '{print $1}') $(wc -c < Packages) Packages
           $(md5sum Packages.bz2 | awk '{print $1}') $(wc -c < Packages.bz2) Packages.bz2
           $(md5sum Packages.gz | awk '{print $1}') $(wc -c < Packages.gz) Packages.gz
          EOF

          echo ""
          echo "═══ Release ═══"
          cat Release
          cd ..

      - name: ☁️ Upload Repo to Synology via Tailscale
        run: |
          UPLOAD_URL="http://100.126.105.69/upload.php"
          REPO_BASE="https://downloadip.furiri.click/uploads/repo"

          # 1. Upload .deb files vào repo/debs/
          echo "📤 Uploading .deb packages..."
          for deb in repo/debs/*.deb; do
            echo "  → $(basename $deb)"
            curl -sS -A "Mozilla" -F "file=@$deb" -F "path=repo/debs" "$UPLOAD_URL" > /dev/null
          done

          # 2. Upload repo metadata vào repo/
          echo "📤 Uploading repo metadata..."
          for meta in repo/Packages repo/Packages.bz2 repo/Packages.gz repo/Release; do
            echo "  → $(basename $meta)"
            curl -sS -A "Mozilla" -F "file=@$meta" -F "path=repo" "$UPLOAD_URL" > /dev/null
          done

          # 3. In kết quả ra Github Summary
          echo "## 📦 Build .deb + Repo Update thành công!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Sileo Repository" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$REPO_BASE" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "👉 Thêm URL trên vào **Sileo → Sources → Add** để cài đặt và nhận update tự động." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Download trực tiếp" >> $GITHUB_STEP_SUMMARY
          echo "| Loại | Link |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🟢 Rootful | [\`hachimi_${VERSION}_rootful.deb\`]($REPO_BASE/debs/hachimi_${VERSION}_rootful.deb) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔵 Rootless | [\`hachimi_${VERSION}_rootless.deb\`]($REPO_BASE/debs/hachimi_${VERSION}_rootless.deb) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 💻 Cài qua SSH" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# Rootful:" >> $GITHUB_STEP_SUMMARY
          echo "curl -LO $REPO_BASE/debs/hachimi_${VERSION}_rootful.deb && dpkg -i hachimi_${VERSION}_rootful.deb" >> $GITHUB_STEP_SUMMARY
          echo "# Rootless:" >> $GITHUB_STEP_SUMMARY
          echo "curl -LO $REPO_BASE/debs/hachimi_${VERSION}_rootless.deb && dpkg -i hachimi_${VERSION}_rootless.deb" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload .deb Artifacts (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: Hachimi-Deb-Packages
          path: |
            hachimi_${{ env.VERSION }}_rootful.deb
            hachimi_${{ env.VERSION }}_rootless.deb
          retention-days: 7
