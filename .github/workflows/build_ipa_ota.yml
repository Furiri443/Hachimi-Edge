name: Build IPA (Patch + Sign + OTA)

# ──────────────────────────────────────────────────────────────────
# Trigger: manual workflow dispatch only.
# Uses bradyjoslin/ios-resign-action to re-sign the patched IPA.
# IPA and manifest are hosted on transfer.sh (14-day expiry).
# Link output appears in the Job Summary after the run finishes.
# ──────────────────────────────────────────────────────────────────
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   P12_BASE64              base64 -w0 YourCert.p12
#   P12_PASSWORD            P12 export password
#   PROVISION_BASE64        base64 -w0 YourProfile.mobileprovision
#   SIGNING_IDENTITY        e.g. "Apple Distribution: Your Name (TEAMID)"
#   TEAM_ID                 Apple Team ID  (e.g. ABCDE12345)
#   BUNDLE_ID               Bundle ID      (e.g. jp.co.cygames.umamusume)
#
# Inputs (on each run):
#   ipa_url      — temporary URL to the original game IPA (not stored)
# ──────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Temporary IPA download URL (Google Drive / WeTransfer / Dropbox)'
        required: true
        type: string
      app_display_name:
        description: 'Custom app name shown on iOS home screen'
        required: false
        default: 'Uma + Hachimi'
        type: string
      enable_files_sharing:
        description: 'Expose game data folder in Files app (UIFileSharingEnabled)'
        required: false
        default: true
        type: boolean
      p12_url:
        description: 'Direct download URL for .p12 certificate (optional)'
        required: false
        type: string
      p12_password:
        description: 'P12 export password (optional, overrides secret)'
        required: false
        type: string
      provision_url:
        description: 'Direct download URL for .mobileprovision (optional)'
        required: false
        type: string
      signing_identity:
        description: 'Signing Identity (e.g. "Apple Distribution: Name (ID)")'
        required: false
        type: string
      team_id:
        description: 'Apple Team ID (e.g. ABCDE12345)'
        required: false
        type: string
      bundle_id:
        description: 'Override Bundle ID (optional)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  patch-sign-ota:
    runs-on: macos-latest
    environment:
      name: BuildiOS
    timeout-minutes: 30

    steps:
      # ── 1. Checkout (for inject_ipa.sh) ──────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Download latest libhachimi.dylib from Build iOS ────────
      - name: Download iOS dylib artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build_ios.yml
          workflow_conclusion: success
          name: ios-dylib
          path: artifacts/

      - name: Verify dylib
        run: |
          DYLIB="artifacts/libhachimi.dylib"
          [[ -f "$DYLIB" ]] || { echo "ERROR: dylib not found"; ls artifacts/; exit 1; }
          echo "dylib: $(du -sh $DYLIB | cut -f1)"
          file "$DYLIB"

      # ── 3. Download IPA (URL passed as input, never logged) ───────
      - name: Download original IPA
        env:
          IPA_URL: ${{ inputs.ipa_url }}
        run: |
          echo "Downloading IPA..."
          curl -fsSL --max-time 300 -L -o original.ipa "$IPA_URL"
          echo "Downloaded: $(du -sh original.ipa | cut -f1)"
          unzip -t original.ipa > /dev/null 2>&1 || { echo "ERROR: Not a valid IPA"; exit 1; }

      # ── 4. Install tools ──────────────────────────────────────────
      - name: Install build tools
        run: |
          brew install ldid

          # Try pre-built optool binary from GitHub release first (fastest)
          OPTOOL_OK=false
          if curl -fsSL --max-time 30 -o /tmp/optool.zip \
              "https://github.com/alexzielenski/optool/releases/download/0.1/optool.zip" 2>/dev/null; then
            unzip -qo /tmp/optool.zip -d /tmp/optool-prebuilt 2>/dev/null || true
            BINARY=$(find /tmp/optool-prebuilt -name "optool" -type f | head -1)
            if [[ -n "$BINARY" ]]; then
              sudo install -m 755 "$BINARY" /usr/local/bin/optool
              OPTOOL_OK=true
              echo "optool installed from pre-built release"
            fi
          fi

          # Fallback: build from source (use find to locate binary)
          if ! $OPTOOL_OK; then
            echo "Pre-built optool failed, building from source..."
            git clone --depth 1 https://github.com/alexzielenski/optool.git /tmp/optool
            xcodebuild -project /tmp/optool/optool.xcodeproj \
              -scheme optool -configuration Release \
              -derivedDataPath /tmp/optool-dd 2>&1 | tail -5
            BINARY=$(find /tmp/optool-dd -name "optool" -type f | head -1)
            if [[ -n "$BINARY" ]]; then
              sudo install -m 755 "$BINARY" /usr/local/bin/optool
              OPTOOL_OK=true
              echo "optool installed from source build"
            fi
          fi

          # Fallback: insert_dylib (no __RESTRICT strip, but works for injection)
          if ! $OPTOOL_OK; then
            echo "WARNING: optool unavailable, falling back to insert_dylib"
            brew install insert_dylib || true
          fi

          optool --version 2>/dev/null || insert_dylib --version 2>/dev/null || echo "Tool ready"

      # ── 5. Inject dylib into IPA ──────────────────────────────────
      - name: Inject libhachimi.dylib into IPA
        run: |
          chmod +x tools/ios/inject_ipa.sh
          tools/ios/inject_ipa.sh \
            "$GITHUB_WORKSPACE/original.ipa" \
            "$GITHUB_WORKSPACE/artifacts/libhachimi.dylib" \
            "$GITHUB_WORKSPACE/patched_unsigned.ipa"
          echo "Patched: $(du -sh "$GITHUB_WORKSPACE/patched_unsigned.ipa" | cut -f1)"

      # ── 6. Patch Info.plist (display name + Files sharing) ────────
      - name: Patch Info.plist
        env:
          DISPLAY_NAME:  ${{ inputs.app_display_name }}
          FILES_SHARING: ${{ inputs.enable_files_sharing }}
        run: |
          # Unpack to a temp dir just for plist editing
          PLIST_WORK=$(mktemp -d /tmp/plist.XXXXXX)
          unzip -q patched_unsigned.ipa -d "$PLIST_WORK"
          PLIST=$(find "$PLIST_WORK/Payload" -maxdepth 2 -name "Info.plist" | head -1)
          echo "Info.plist: $PLIST"

          # Convert to XML if binary
          plutil -convert xml1 "$PLIST"

          # 1. Custom display name (only if provided)
          if [[ -n "$DISPLAY_NAME" ]]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName $DISPLAY_NAME" "$PLIST" 2>/dev/null \
              || /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string $DISPLAY_NAME" "$PLIST"
            echo "CFBundleDisplayName → $DISPLAY_NAME"
          fi

          # 2. Files app sharing (expose Documents/ in iOS Files)
          if [[ "$FILES_SHARING" == "true" ]]; then
            /usr/libexec/PlistBuddy -c "Set :UIFileSharingEnabled true" "$PLIST" 2>/dev/null \
              || /usr/libexec/PlistBuddy -c "Add :UIFileSharingEnabled bool true" "$PLIST"
            /usr/libexec/PlistBuddy -c "Set :LSSupportsOpeningDocumentsInPlace true" "$PLIST" 2>/dev/null \
              || /usr/libexec/PlistBuddy -c "Add :LSSupportsOpeningDocumentsInPlace bool true" "$PLIST"
            echo "Files sharing → enabled"
          fi

          # Repack
          (cd "$PLIST_WORK" && zip -qr "$GITHUB_WORKSPACE/patched_unsigned.ipa" Payload)
          rm -rf "$PLIST_WORK"
          echo "Info.plist patched OK"

          # Read actual app version from IPA Info.plist for OTA manifest
          PEEK=$(mktemp -d /tmp/ver.XXXXXX)
          unzip -q "$GITHUB_WORKSPACE/patched_unsigned.ipa" -d "$PEEK"
          VER_PLIST=$(find "$PEEK/Payload" -maxdepth 2 -name "Info.plist" | head -1)
          plutil -convert xml1 "$VER_PLIST" 2>/dev/null || true
          APP_VERSION=$(
            /usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$VER_PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$VER_PLIST" 2>/dev/null \
            || echo "1.0"
          )
          rm -rf "$PEEK"
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          echo "Detected app version: $APP_VERSION"

      # ── 7. Prepare Signing Assets ─────────────────────────────────
      - name: Prepare Signing Assets
        env:
          P12_URL: ${{ inputs.p12_url }}
          P12_PASS: ${{ inputs.p12_password || secrets.P12_PASSWORD || secrets.IOS_P12_PASSWORD }}
          PROVISION_URL: ${{ inputs.provision_url }}
          SIGNING_IDENTITY: ${{ inputs.signing_identity || secrets.SIGNING_IDENTITY || secrets.IOS_CODE_SIGN_IDENTITY }}
          TEAM_ID: ${{ inputs.team_id || secrets.TEAM_ID || secrets.IOS_TEAM_ID }}
          BUNDLE_ID: ${{ inputs.bundle_id || secrets.BUNDLE_ID || secrets.IOS_BUNDLE_ID }}
          # Fallback secrets if URLs not used
          P12_B64: ${{ secrets.P12_BASE64 || secrets.IOS_P12_BASE64 }}
          PROVISION_B64: ${{ secrets.PROVISION_BASE64 || secrets.IOS_PROVISION_BASE64 }}
        run: |
          set -e

          # 1. Download or Use Secret for P12
          if [[ -n "$P12_URL" ]]; then
            echo "Downloading P12 from URL..."
            curl -fsSL --max-time 60 -L -o cert.p12 "$P12_URL"
            # Basic sanity check: check if it's an HTML page (e.g. from Google Drive/Dropbox preview)
            if grep -q "<!DOCTYPE html>" cert.p12 2>/dev/null; then
              echo "ERROR: P12_URL returned an HTML page, not a binary file. Check the link."
              exit 1
            fi
          elif [[ -n "$P12_B64" ]]; then
            echo "Using P12 from secrets..."
            echo "$P12_B64" | base64 -d > cert.p12
          else
            echo "ERROR: No P12 provided (URL or Secret)"
            exit 1
          fi

          # 2. Fix 'Unable to decode' by converting to legacy P12 format
          # macOS 'security' tool often fails with modern PKCS#12 v3 encryption.
          # We re-export it with legacy encryption to be safe.
          echo "Converting P12 to legacy format for macOS compatibility..."
          openssl pkcs12 -in cert.p12 -passin "pass:$P12_PASS" \
            -export -out cert_legacy.p12 -passout "pass:$P12_PASS" \
            -legacy 2>/dev/null || {
              echo "Legacy conversion failed, attempting standard re-export..."
              openssl pkcs12 -in cert.p12 -passin "pass:$P12_PASS" \
                -export -out cert_legacy.p12 -passout "pass:$P12_PASS"
            }

          CERT_P12_FINAL=$(base64 -i cert_legacy.p12 | tr -d '\n')
          echo "CERT_P12=$CERT_P12_FINAL" >> $GITHUB_ENV

          # 3. Download or Use Secret for Provisioning Profile
          if [[ -n "$PROVISION_URL" ]]; then
            echo "Downloading provisioning profile from URL..."
            curl -fsSL --max-time 60 -L -o profile.mobileprovision "$PROVISION_URL"
            if grep -q "<!DOCTYPE html>" profile.mobileprovision 2>/dev/null; then
              echo "ERROR: PROVISION_URL returned an HTML page. Check the link."
              exit 1
            fi
          elif [[ -n "$PROVISION_B64" ]]; then
            echo "Using provisioning profile from secrets..."
            echo "$PROVISION_B64" | base64 -d > profile.mobileprovision
          else
            echo "ERROR: No provisioning profile provided"
            exit 1
          fi

          PROVISION_FINAL=$(base64 -i profile.mobileprovision | tr -d '\n')
          echo "MOBILEPROVISION=$PROVISION_FINAL" >> $GITHUB_ENV

          # 4. Export other signing variables
          echo "P12_PASS=$P12_PASS" >> $GITHUB_ENV
          echo "SIGNING_IDENTITY=$SIGNING_IDENTITY" >> $GITHUB_ENV
          echo "TEAM_ID=$TEAM_ID" >> $GITHUB_ENV
          if [[ -n "$BUNDLE_ID" ]]; then
            echo "BUNDLE_ID=$BUNDLE_ID" >> $GITHUB_ENV
          fi

      # ── 8. Re-sign IPA using ios-resign-action (ad-hoc) ──────────
      - name: Re-sign IPA (ad-hoc)
        uses: bradyjoslin/ios-resign-action@v1
        with:
          ipa_path: patched_unsigned.ipa
          mobileprovision: ${{ env.MOBILEPROVISION }}
          cert_p12: ${{ env.CERT_P12 }}
          p12_pass: ${{ env.P12_PASS }}
          signing_identity: ${{ env.SIGNING_IDENTITY }}

      - name: Prepare signed IPA
        run: |
          # ios-resign-action re-signs in-place
          cp patched_unsigned.ipa signed.ipa
          echo "Signed IPA: $(du -sh signed.ipa | cut -f1)"
          # Verify signature
          WORK=$(mktemp -d /tmp/verify.XXXXXX)
          unzip -q signed.ipa -d "$WORK"
          APP=$(find "$WORK/Payload" -maxdepth 1 -name "*.app" | head -1)
          codesign --verify --deep --strict "$APP" && echo "✅ Signature valid" || echo "⚠️ Signature check failed"
          rm -rf "$WORK"

      # ── 9. Upload to transfer.sh ──────────────────────────────────
      - name: Upload IPA to transfer.sh (14-day link)
        env:
          BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
          APP_DISPLAY_NAME: ${{ inputs.app_display_name }}
        run: |
          RUN_ID="${{ github.run_id }}"

          # Upload IPA
          IPA_URL=$(curl -fsSL \
            --upload-file signed.ipa \
            "https://transfer.sh/hachimi-${RUN_ID}.ipa")
          echo "IPA_URL=$IPA_URL" >> $GITHUB_ENV
          echo "IPA_URL: $IPA_URL"

          # Generate OTA manifest for itms-services
          cat > manifest.plist <<'MANIFEST_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>items</key>
              <array>
                  <dict>
                      <key>assets</key>
                      <array>
                          <dict>
                              <key>kind</key>
                              <string>software-package</string>
                              <key>url</key>
                              <string>__IPA_URL__</string>
                          </dict>
                      </array>
                      <key>metadata</key>
                      <dict>
                          <key>bundle-identifier</key>
                          <string>__BUNDLE_ID__</string>
                          <key>bundle-version</key>
                          <string>__APP_VERSION__</string>
                          <key>kind</key>
                          <string>software</string>
                          <key>title</key>
                          <string>__DISPLAY_NAME__</string>
                      </dict>
                  </dict>
              </array>
          </dict>
          </plist>
          MANIFEST_EOF

          # Replace placeholders with actual values
          DISPLAY="${APP_DISPLAY_NAME:-Uma Musume + Hachimi}"
          sed -i '' \
            -e "s|__IPA_URL__|${IPA_URL}|g" \
            -e "s|__BUNDLE_ID__|${BUNDLE_ID}|g" \
            -e "s|__APP_VERSION__|${APP_VERSION}|g" \
            -e "s|__DISPLAY_NAME__|${DISPLAY}|g" \
            manifest.plist

          # Upload manifest
          MANIFEST_URL=$(curl -fsSL \
            --upload-file manifest.plist \
            "https://transfer.sh/hachimi-manifest-${RUN_ID}.plist")
          echo "MANIFEST_URL=$MANIFEST_URL" >> $GITHUB_ENV
          echo "MANIFEST_URL: $MANIFEST_URL"

      # ── 10. Save as Actions artifact (for manual download backup) ──
      - name: Upload signed IPA as artifact (90 days)
        uses: actions/upload-artifact@v4
        with:
          name: hachimi-signed-ipa-${{ github.run_id }}
          path: signed.ipa
          retention-days: 90
          if-no-files-found: error

      # ── 11. Print OTA link in Job Summary ─────────────────────────
      - name: Output OTA install link
        run: |
          OTA_LINK="itms-services://?action=download-manifest&url=${MANIFEST_URL}"

          echo "## 📲 Hachimi — OTA Install Link" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⚠️ **Links expire in 14 days** (hosted on transfer.sh)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Open on iPhone with Safari:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$OTA_LINK" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 IPA | ${IPA_URL} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📋 Manifest | ${MANIFEST_URL} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🕐 Built | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---"
          echo "OTA LINK → $OTA_LINK"
