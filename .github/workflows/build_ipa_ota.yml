name: Build IPA (Patch + Sign + OTA)

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Direct URL to the original IPA (optional if using secret)'
        required: false
        type: string
      app_display_name:
        description: 'App name on iOS home screen'
        required: false
        default: 'Uma + Hachimi'
        type: string
      bundle_id:
        description: 'Custom Bundle ID (e.g., com.cygames.umamusume.chiyono)'
        required: false
        default: 'app.papaya2933.cheetah1054'
        type: string
      enable_files_sharing:
        description: 'Enable iTunes File Sharing'
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  patch-sign-ota:
    runs-on: macos-latest
    
    # 🎯 KHAI BÁO ENVIRONMENT Ở ĐÂY
    environment: 
      name: BuildiOS
      
    timeout-minutes: 20
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download iOS dylib artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build_ios.yml
          workflow_conclusion: success
          name: ios-dylib
          path: artifacts/
      - name: Start Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          hostname: gha-${{ github.run_id }}
      - name: Download Original IPA
        env:
          URL: ${{ inputs.ipa_url || secrets.IPA_URL }}
        run: |
          curl -fsSL --max-time 300 -L -o original.ipa "$URL"
          unzip -t original.ipa > /dev/null 2>&1 || { echo "ERROR: Invalid IPA"; exit 1; }

      - name: Install Injection Tools
        run: |
          # 1. Cài đặt ldid qua Homebrew (ldid có sẵn trong thư viện chuẩn)
          brew install ldid
          
          # 2. Tải và compile insert_dylib từ mã nguồn chính thức của tác giả
          echo "Building insert_dylib from source..."
          git clone --depth 1 https://github.com/Tyilo/insert_dylib.git /tmp/insert_dylib
          cd /tmp/insert_dylib
          xcodebuild -configuration Release > /dev/null
          
          # 3. Copy file thực thi vào hệ thống để dùng cho bước sau
          sudo cp build/Release/insert_dylib /usr/local/bin/
          
          # 4. Kiểm tra cài đặt
          insert_dylib || echo "insert_dylib ready!"
      - name: Inject dylib into IPA
        run: |
          chmod +x tools/ios/inject_ipa.sh
          
          # Sử dụng đường dẫn tuyệt đối để đảm bảo file lưu đúng chỗ
          tools/ios/inject_ipa.sh \
            "$GITHUB_WORKSPACE/original.ipa" \
            "$GITHUB_WORKSPACE/artifacts/libhachimi.dylib" \
            "$GITHUB_WORKSPACE/patched_unsigned.ipa"
            
          # Dừng ngay Action báo lỗi đỏ nếu script trên chạy thất bại không ra file
          if [ ! -f "$GITHUB_WORKSPACE/patched_unsigned.ipa" ]; then
            echo "❌ LỖI NGHIÊM TRỌNG: inject_ipa.sh không tạo ra được file patched_unsigned.ipa!"
            echo "Vui lòng cuộn lên kiểm tra log của script inject xem có lỗi gì xảy ra."
            exit 1
          fi
          echo "✅ Đã tạo thành công patched_unsigned.ipa"

      - name: Clean & Patch Info.plist
        env:
          DISPLAY_NAME: ${{ inputs.app_display_name }}
          FILES_SHARING: ${{ inputs.enable_files_sharing }}
          CUSTOM_BUNDLE_ID: ${{ inputs.bundle_id }}
        run: |
          # Đảm bảo đang đứng ở đúng thư mục gốc chứa file
          cd "$GITHUB_WORKSPACE"
          
          # Xóa các App Extension gây lỗi signing (Nếu không có thì báo qua, không lỗi)
          zip -d patched_unsigned.ipa "Payload/*.app/PlugIns/*" "Payload/*.app/PlugIns" "Payload/*.app/Watch/*" "Payload/*.app/Watch" || echo "Không có PlugIns/Watch để xóa"
          
          PLIST_WORK=$(mktemp -d)
          unzip -q patched_unsigned.ipa -d "$PLIST_WORK"
          PLIST=$(find "$PLIST_WORK/Payload" -maxdepth 2 -name "Info.plist" | head -1)
          
          # Đổi App Name
          if [[ -n "$DISPLAY_NAME" ]]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName $DISPLAY_NAME" "$PLIST" || /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string $DISPLAY_NAME" "$PLIST"
          fi
          
          # Đổi Bundle ID
          if [[ -n "$CUSTOM_BUNDLE_ID" ]]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $CUSTOM_BUNDLE_ID" "$PLIST" || /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string $CUSTOM_BUNDLE_ID" "$PLIST"
            echo "BUNDLE_ID=$CUSTOM_BUNDLE_ID" >> $GITHUB_ENV
          else
            ORIG_ID=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$PLIST" 2>/dev/null)
            echo "BUNDLE_ID=$ORIG_ID" >> $GITHUB_ENV
          fi

          # Bật File Sharing
          if [[ "$FILES_SHARING" == "true" ]]; then
            /usr/libexec/PlistBuddy -c "Set :UIFileSharingEnabled true" "$PLIST" || /usr/libexec/PlistBuddy -c "Add :UIFileSharingEnabled bool true" "$PLIST"
            /usr/libexec/PlistBuddy -c "Set :LSSupportsOpeningDocumentsInPlace true" "$PLIST" || /usr/libexec/PlistBuddy -c "Add :LSSupportsOpeningDocumentsInPlace bool true" "$PLIST"
          fi
          
          # Lấy Version cho OTA
          APP_VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$PLIST" 2>/dev/null || echo "1.0")
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          
          # Xóa file cũ và Đóng gói lại
          rm -f patched_unsigned.ipa
          (cd "$PLIST_WORK" && zip -qr "$GITHUB_WORKSPACE/patched_unsigned.ipa" Payload)

      - name: 🚑 Fix & Validate P12 Certificate
        env:
          P12_B64: ${{ secrets.P12_BASE64 }}
          P12_PASS: ${{ secrets.P12_PASSWORD }}
        run: |
          echo "Cài đặt công cụ OpenSSL chuẩn..."
          brew install openssl
          OPENSSL_BIN="$(brew --prefix openssl)/bin/openssl"
          
          # 1. Giải mã Base64 (Lọc sạch mọi ký tự rác/xuống dòng từ Windows)
          echo "$P12_B64" | tr -d '\n\r ' | base64 -d > cert.p12
          
          # 2. Kiểm tra tính hợp lệ của file và mật khẩu
          echo "Đang kiểm tra chứng chỉ..."
          if ! $OPENSSL_BIN pkcs12 -info -in cert.p12 -noout -passin "pass:$P12_PASS" 2>/dev/null; then
            echo "❌ LỖI NGHIÊM TRỌNG: Mật khẩu P12_PASSWORD bị sai, HOẶC file Base64 đã bị hỏng!"
            exit 1
          fi
          echo "✅ Mật khẩu và file chứng chỉ hoàn toàn chính xác!"
          
          # 3. Ép kiểu mã hóa về chuẩn cổ điển của Apple Keychain (RC2/3DES)
          echo "Đang ép kiểu mã hóa tương thích với Apple..."
          $OPENSSL_BIN pkcs12 -in cert.p12 -passin "pass:$P12_PASS" -nodes -out temp.pem 2>/dev/null
          $OPENSSL_BIN pkcs12 -export -in temp.pem -out legacy.p12 -passout "pass:$P12_PASS" -certpbe PBE-SHA1-3DES -keypbe PBE-SHA1-3DES -macalg sha1 2>/dev/null
          
          # 4. Lưu lại Base64 mới để truyền vào Apple Action
          LEGACY_B64=$(base64 -i legacy.p12 | tr -d '\n')
          echo "P12_B64_FIXED=$LEGACY_B64" >> $GITHUB_ENV
          
          # 5. Dọn dẹp
          rm cert.p12 temp.pem legacy.p12

      - name: 🍏 Import Apple Certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          # Đã đổi sang dùng file đã được FIX ở bước trên
          p12-file-base64: ${{ env.P12_B64_FIXED }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: 🚀 Re-sign IPA with Fastlane
        env:
          PROVISION_B64: ${{ secrets.PROVISION_BASE64 }}
          BUNDLE_ID: ${{ env.BUNDLE_ID }}
        run: |
          # 1. Giải mã Provisioning Profile
          echo "$PROVISION_B64" | tr -d '\n\r ' | base64 -d > profile.mobileprovision
          
          # 2. Tự động lấy Signing Identity (Mã SHA1) từ Keychain của macOS
          SIGNING_IDENTITY=$(security find-identity -v -p codesigning | grep ')' | awk '{print $2}' | head -n 1)
          
          if [ -z "$SIGNING_IDENTITY" ]; then
            echo "❌ LỖI: Không tìm thấy chứng chỉ nào trong hệ thống!"
            security find-identity -v -p codesigning
            exit 1
          fi
          
          echo "✅ Đã nhận diện được Signing Identity: $SIGNING_IDENTITY"
          
          # 3. Chạy lệnh Fastlane với đầy đủ tham số
          fastlane run resign \
            ipa:"patched_unsigned.ipa" \
            signing_identity:"$SIGNING_IDENTITY" \
            provisioning_profile:"profile.mobileprovision" \
            bundle_id:"$BUNDLE_ID"

      - name: ☁️ Upload to Synology via Tailscale
        run: |
          # 1. Tạo chuỗi ngẫu nhiên toàn chữ cái để tránh bị Github kiểm duyệt số
          RAND="hachimi$(cat /dev/urandom | tr -dc 'a-zA-Z' | fold -w 6 | head -n 1)"
          
          IPA_FILE="${RAND}.ipa"
          PLIST_FILE="${RAND}.plist"
          HTML_FILE="${RAND}.html"
          
          # 2. Upload IPA
          mv patched_unsigned.ipa "$IPA_FILE"
          echo "Đang upload IPA lên NAS..."
          curl -sS -A "Mozilla" -F "file=@$IPA_FILE" http://100.126.105.69/upload.php > /dev/null
          
          IPA_URL="https://downloadip.furiri.click/uploads/$IPA_FILE"
          
          # 3. Tạo file cấu hình Manifest
          cat > "$PLIST_FILE" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict><key>items</key><array><dict><key>assets</key><array><dict><key>kind</key><string>software-package</string><key>url</key><string>${IPA_URL}</string></dict></array><key>metadata</key><dict><key>bundle-identifier</key><string>${BUNDLE_ID}</string><key>bundle-version</key><string>${APP_VERSION}</string><key>kind</key><string>software</string><key>title</key><string>${{ inputs.app_display_name }}</string></dict></dict></array></dict></plist>
          EOF
          
          # 4. Upload Manifest
          echo "Đang upload Manifest lên NAS..."
          curl -sS -A "Mozilla" -F "file=@$PLIST_FILE" http://100.126.105.69/upload.php > /dev/null
          
          PLIST_URL="https://downloadip.furiri.click/uploads/$PLIST_FILE"
          OTA_LINK="itms-services://?action=download-manifest&url=${PLIST_URL}"
          
          # 5. TẠO TRANG WEB CÀI ĐẶT MINI (HTML)
          ENCODED_OTA=$(jq -nr --arg v "$OTA_LINK" '$v | @uri')
          QR_URL="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${ENCODED_OTA}"
          
          cat > "$HTML_FILE" <<EOF
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Cài đặt ${{ inputs.app_display_name }}</title>
              <style>
                  body { font-family: -apple-system, sans-serif; text-align: center; margin-top: 50px; background-color: #f2f2f7; }
                  .container { background: white; padding: 30px; border-radius: 20px; max-width: 400px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
                  h2 { color: #1c1c1e; }
                  .btn { display: block; padding: 15px; background: #007aff; color: white; text-decoration: none; border-radius: 12px; font-size: 18px; font-weight: bold; margin-top: 20px; }
                  .qr-code { margin-top: 30px; border: 2px solid #e5e5ea; border-radius: 12px; padding: 10px; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h2>🚀 Cài đặt Ứng dụng</h2>
                  <p>Bấm nút bên dưới từ trình duyệt Safari trên iPhone để cài đặt:</p>
                  <a class="btn" href="${OTA_LINK}">📥 Cài đặt ngay</a>
                  <p style="margin-top: 30px; color: #8e8e93;">Hoặc dùng Camera quét mã QR:</p>
                  <img class="qr-code" src="${QR_URL}" width="200" alt="QR Code">
              </div>
          </body>
          </html>
          EOF
          
          # 6. Upload trang Web lên NAS
          echo "Đang upload Trang cài đặt lên NAS..."
          curl -sS -A "Mozilla" -F "file=@$HTML_FILE" http://100.126.105.69/upload.php > /dev/null
          
          HTML_URL="https://downloadip.furiri.click/uploads/$HTML_FILE"
          
          # 7. In kết quả ra Github (Chỉ in link web, không có số nên không bao giờ bị che)
          echo "## 🎉 Build thành công!" >> $GITHUB_STEP_SUMMARY
          echo "👉 **[Bấm vào đây để mở Trang Cài Đặt](${HTML_URL})**" >> $GITHUB_STEP_SUMMARY
          
          echo "RAND_STR=${RAND}" >> $GITHUB_ENV

      - name: Upload IPA Artifact (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: Hachimi-Signed-IPA
          path: patched_unsigned.ipa
          retention-days: 7
