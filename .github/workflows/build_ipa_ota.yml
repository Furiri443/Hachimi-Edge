name: Build IPA (Patch + Sign + OTA)

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Direct URL to the original IPA (optional if using secret)'
        required: false
        type: string
      app_display_name:
        description: 'App name on iOS home screen'
        required: false
        default: 'Uma + Hachimi'
        type: string
      bundle_id:
        description: 'Custom Bundle ID (e.g., com.cygames.umamusume.chiyono)'
        required: false
        default: 'com.cygames.umamusume.chiyono'
        type: string
      enable_files_sharing:
        description: 'Enable iTunes File Sharing'
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  patch-sign-ota:
    runs-on: macos-latest
    
    # 🎯 KHAI BÁO ENVIRONMENT Ở ĐÂY
    environment: 
      name: BuildiOS
      
    timeout-minutes: 20
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download iOS dylib artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build_ios.yml
          workflow_conclusion: success
          name: ios-dylib
          path: artifacts/

      - name: Download Original IPA
        env:
          URL: ${{ inputs.ipa_url || secrets.IPA_URL }}
        run: |
          curl -fsSL --max-time 300 -L -o original.ipa "$URL"
          unzip -t original.ipa > /dev/null 2>&1 || { echo "ERROR: Invalid IPA"; exit 1; }

      - name: Install Injection Tools
        run: |
          # 1. Cài đặt ldid qua Homebrew (ldid có sẵn trong thư viện chuẩn)
          brew install ldid
          
          # 2. Tải và compile insert_dylib từ mã nguồn chính thức của tác giả
          echo "Building insert_dylib from source..."
          git clone --depth 1 https://github.com/Tyilo/insert_dylib.git /tmp/insert_dylib
          cd /tmp/insert_dylib
          xcodebuild -configuration Release > /dev/null
          
          # 3. Copy file thực thi vào hệ thống để dùng cho bước sau
          sudo cp build/Release/insert_dylib /usr/local/bin/
          
          # 4. Kiểm tra cài đặt
          insert_dylib || echo "insert_dylib ready!"
      - name: Inject dylib into IPA
        run: |
          chmod +x tools/ios/inject_ipa.sh
          
          # Sử dụng đường dẫn tuyệt đối để đảm bảo file lưu đúng chỗ
          tools/ios/inject_ipa.sh \
            "$GITHUB_WORKSPACE/original.ipa" \
            "$GITHUB_WORKSPACE/artifacts/libhachimi.dylib" \
            "$GITHUB_WORKSPACE/patched_unsigned.ipa"
            
          # Dừng ngay Action báo lỗi đỏ nếu script trên chạy thất bại không ra file
          if [ ! -f "$GITHUB_WORKSPACE/patched_unsigned.ipa" ]; then
            echo "❌ LỖI NGHIÊM TRỌNG: inject_ipa.sh không tạo ra được file patched_unsigned.ipa!"
            echo "Vui lòng cuộn lên kiểm tra log của script inject xem có lỗi gì xảy ra."
            exit 1
          fi
          echo "✅ Đã tạo thành công patched_unsigned.ipa"

      - name: Clean & Patch Info.plist
        env:
          DISPLAY_NAME: ${{ inputs.app_display_name }}
          FILES_SHARING: ${{ inputs.enable_files_sharing }}
          CUSTOM_BUNDLE_ID: ${{ inputs.bundle_id }}
        run: |
          # Đảm bảo đang đứng ở đúng thư mục gốc chứa file
          cd "$GITHUB_WORKSPACE"
          
          # Xóa các App Extension gây lỗi signing (Nếu không có thì báo qua, không lỗi)
          zip -d patched_unsigned.ipa "Payload/*.app/PlugIns/*" "Payload/*.app/PlugIns" "Payload/*.app/Watch/*" "Payload/*.app/Watch" || echo "Không có PlugIns/Watch để xóa"
          
          PLIST_WORK=$(mktemp -d)
          unzip -q patched_unsigned.ipa -d "$PLIST_WORK"
          PLIST=$(find "$PLIST_WORK/Payload" -maxdepth 2 -name "Info.plist" | head -1)
          
          # Đổi App Name
          if [[ -n "$DISPLAY_NAME" ]]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName $DISPLAY_NAME" "$PLIST" || /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string $DISPLAY_NAME" "$PLIST"
          fi
          
          # Đổi Bundle ID
          if [[ -n "$CUSTOM_BUNDLE_ID" ]]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $CUSTOM_BUNDLE_ID" "$PLIST" || /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string $CUSTOM_BUNDLE_ID" "$PLIST"
            echo "BUNDLE_ID=$CUSTOM_BUNDLE_ID" >> $GITHUB_ENV
          else
            ORIG_ID=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$PLIST" 2>/dev/null)
            echo "BUNDLE_ID=$ORIG_ID" >> $GITHUB_ENV
          fi

          # Bật File Sharing
          if [[ "$FILES_SHARING" == "true" ]]; then
            /usr/libexec/PlistBuddy -c "Set :UIFileSharingEnabled true" "$PLIST" || /usr/libexec/PlistBuddy -c "Add :UIFileSharingEnabled bool true" "$PLIST"
            /usr/libexec/PlistBuddy -c "Set :LSSupportsOpeningDocumentsInPlace true" "$PLIST" || /usr/libexec/PlistBuddy -c "Add :LSSupportsOpeningDocumentsInPlace bool true" "$PLIST"
          fi
          
          # Lấy Version cho OTA
          APP_VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$PLIST" 2>/dev/null || echo "1.0")
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          
          # Xóa file cũ và Đóng gói lại
          rm -f patched_unsigned.ipa
          (cd "$PLIST_WORK" && zip -qr "$GITHUB_WORKSPACE/patched_unsigned.ipa" Payload)

      - name: Re-sign IPA
        uses: bradyjoslin/ios-resign-action@v1
        with:
          ipa_path: patched_unsigned.ipa
          p12_base64: ${{ secrets.P12_BASE64 }}
          p12_password: ${{ secrets.P12_PASSWORD }}
          mobileprovision_base64: ${{ secrets.PROVISION_BASE64 }}
          bundle_id: ${{ env.BUNDLE_ID }}

      - name: Upload to transfer.sh (OTA Link)
        run: |
          RUN_ID="${{ github.run_id }}"
          IPA_URL=$(curl -fsSL --upload-file patched_unsigned.ipa "https://transfer.sh/hachimi-${RUN_ID}.ipa")
          
          cat > manifest.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict><key>items</key><array><dict><key>assets</key><array><dict><key>kind</key><string>software-package</string><key>url</key><string>${IPA_URL}</string></dict></array><key>metadata</key><dict><key>bundle-identifier</key><string>${BUNDLE_ID}</string><key>bundle-version</key><string>${APP_VERSION}</string><key>kind</key><string>software</string><key>title</key><string>${{ inputs.app_display_name }}</string></dict></dict></array></dict></plist>
          EOF
          MANIFEST_URL=$(curl -fsSL --upload-file manifest.plist "https://transfer.sh/hachimi-manifest-${RUN_ID}.plist")
          
          OTA_LINK="itms-services://?action=download-manifest&url=${MANIFEST_URL}"
          
          echo "## 📲 Cài đặt OTA qua Safari" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          echo "$OTA_LINK" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload IPA Artifact (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: Hachimi-Signed-IPA
          path: patched_unsigned.ipa
          retention-days: 7
